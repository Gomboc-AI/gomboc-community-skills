AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  ListenerProtocol:
    Type: String
    Default: HTTPS
  SomeActions:
    Type: String
Resources:
  ListenerMissingProtocol:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref MyALB
      Port: 80
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref MyTargetGroup
  ListenerHttpUnquoted:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref MyALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref MyTargetGroup
  ListenerHttpDoubleQuoted:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref MyALB
      Port: 80
      Protocol: "HTTP"
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref MyTargetGroup
  ListenerHttpSingleQuoted:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref MyALB
      Port: 80
      Protocol: 'HTTP'
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref MyTargetGroup
  ListenerHttpCompliantRedirect:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref MyALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: redirect
          RedirectConfig:
            Protocol: HTTPS
            StatusCode: HTTP_301
  ListenerHttpsUnquoted:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref MyALB
      Port: 443
      Protocol: HTTPS
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref MyTargetGroup
  ListenerHttpsDoubleQuoted:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref MyALB
      Port: 443
      Protocol: "HTTPS"
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref MyTargetGroup
  ListenerHttpsSingleQuoted:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref MyALB
      Port: 443
      Protocol: 'HTTPS'
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref MyTargetGroup
  ListenerTlsProtocol:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref MyNLB
      Port: 443
      Protocol: TLS
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref MyTargetGroup
  ListenerTcpProtocol:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref MyNLB
      Port: 80
      Protocol: TCP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref MyTargetGroup
  ListenerDynamicProtocolRef:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref MyALB
      Port: 443
      Protocol: !Ref ListenerProtocol
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref MyTargetGroup
  ListenerDynamicProtocolIf:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref MyALB
      Port: 443
      Protocol: !If [IsProd, HTTPS, HTTP]
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref MyTargetGroup
  ListenerDynamicDefaultActions:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref MyALB
      Port: 80
      Protocol: HTTP
      DefaultActions: !Ref SomeActions
  TargetGroupWrongResourceType:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Port: 80
      Protocol: HTTP
      VpcId: !Ref MyVPC
  ListenerHttpDoubleQuotedRedirectType:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref MyALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: "redirect"
          RedirectConfig:
            Protocol: HTTPS
            StatusCode: HTTP_301
  ListenerHttpSingleQuotedRedirectType:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref MyALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: 'redirect'
          RedirectConfig:
            Protocol: HTTPS
            StatusCode: HTTP_301
  ListenerHttpRedirectWithQuotedHttps:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref MyALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: redirect
          RedirectConfig:
            Protocol: "HTTPS"
            StatusCode: HTTP_301
  ListenerLongFormDynamicDefaultActions:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref MyALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        Fn::If:
          - IsRedirectEnabled
          - - Type: redirect
              RedirectConfig:
                Protocol: HTTPS
                StatusCode: HTTP_301
          - - Type: forward
              TargetGroupArn: !Ref MyTargetGroup
  ListenerMissingProtocolDynamicActions:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref MyALB
      Port: 80
      DefaultActions: !Ref SomeActions
  ListenerMissingProtocolLongFormActions:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref MyALB
      Port: 80
      DefaultActions:
        Fn::If:
          - IsRedirectEnabled
          - - Type: redirect
              RedirectConfig:
                Protocol: HTTPS
                StatusCode: HTTP_301
          - - Type: forward
              TargetGroupArn: !Ref MyTargetGroup
  ListenerMissingProtocolStaticRedirect:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref MyALB
      Port: 80
      DefaultActions:
        - Type: redirect
          RedirectConfig:
            Protocol: HTTPS
            StatusCode: HTTP_301
  ListenerLongFormRefProtocol:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref MyALB
      Port: 443
      Protocol:
        Ref: ListenerProtocol
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref MyTargetGroup
