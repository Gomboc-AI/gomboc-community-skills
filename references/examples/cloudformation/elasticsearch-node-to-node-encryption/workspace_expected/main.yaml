Resources:
  MissingBlockDomain:
    Type: AWS::Elasticsearch::Domain
    Properties:
      DomainName: missing-block-domain
      ElasticsearchVersion: "7.10"
      NodeToNodeEncryptionOptions:
        Enabled: true

  MissingEnabledDomain:
    Type: AWS::Elasticsearch::Domain
    Properties:
      DomainName: missing-enabled-domain
      ElasticsearchVersion: "7.10"
      NodeToNodeEncryptionOptions:
        SomeOtherKey: somevalue
        Enabled: true
  ExplicitFalseUnquotedDomain:
    Type: AWS::Elasticsearch::Domain
    Properties:
      DomainName: explicit-false-unquoted-domain
      ElasticsearchVersion: "7.10"
      NodeToNodeEncryptionOptions:
        Enabled: true

  ExplicitFalseDoubleQuotedDomain:
    Type: AWS::Elasticsearch::Domain
    Properties:
      DomainName: explicit-false-double-quoted-domain
      ElasticsearchVersion: "7.10"
      NodeToNodeEncryptionOptions:
        Enabled: true

  ExplicitFalseSingleQuotedDomain:
    Type: AWS::Elasticsearch::Domain
    Properties:
      DomainName: explicit-false-single-quoted-domain
      ElasticsearchVersion: "7.10"
      NodeToNodeEncryptionOptions:
        Enabled: true

  ExplicitFalseCapitalizedDomain:
    Type: AWS::Elasticsearch::Domain
    Properties:
      DomainName: explicit-false-capitalized-domain
      ElasticsearchVersion: "7.10"
      NodeToNodeEncryptionOptions:
        Enabled: true

  ExplicitFalseNoDomain:
    Type: AWS::Elasticsearch::Domain
    Properties:
      DomainName: explicit-false-no-domain
      ElasticsearchVersion: "7.10"
      NodeToNodeEncryptionOptions:
        Enabled: true

  ExplicitFalseNoDQDomain:
    Type: AWS::Elasticsearch::Domain
    Properties:
      DomainName: explicit-false-no-dq-domain
      ElasticsearchVersion: "7.10"
      NodeToNodeEncryptionOptions:
        Enabled: true

  ExplicitTrueUnquotedDomain:
    Type: AWS::Elasticsearch::Domain
    Properties:
      DomainName: explicit-true-unquoted-domain
      ElasticsearchVersion: "7.10"
      NodeToNodeEncryptionOptions:
        Enabled: true

  ExplicitTrueDoubleQuotedDomain:
    Type: AWS::Elasticsearch::Domain
    Properties:
      DomainName: explicit-true-double-quoted-domain
      ElasticsearchVersion: "7.10"
      NodeToNodeEncryptionOptions:
        Enabled: "true"

  ExplicitTrueSingleQuotedDomain:
    Type: AWS::Elasticsearch::Domain
    Properties:
      DomainName: explicit-true-single-quoted-domain
      ElasticsearchVersion: "7.10"
      NodeToNodeEncryptionOptions:
        Enabled: 'true'

  ExplicitTrueYesDomain:
    Type: AWS::Elasticsearch::Domain
    Properties:
      DomainName: explicit-true-yes-domain
      ElasticsearchVersion: "7.10"
      NodeToNodeEncryptionOptions:
        Enabled: yes

  RefParamDomain:
    Type: AWS::Elasticsearch::Domain
    Properties:
      DomainName: ref-param-domain
      ElasticsearchVersion: "7.10"
      NodeToNodeEncryptionOptions:
        Enabled: !Ref EnableNodeEncryption

  IfCondDomain:
    Type: AWS::Elasticsearch::Domain
    Properties:
      DomainName: if-cond-domain
      ElasticsearchVersion: "7.10"
      NodeToNodeEncryptionOptions:
        Enabled: !If [IsProd, true, !Ref "AWS::NoValue"]

  OpenSearchDomainWrongType:
    Type: AWS::OpenSearchService::Domain
    Properties:
      DomainName: opensearch-domain
      EngineVersion: "OpenSearch_2.3"
      NodeToNodeEncryptionOptions:
        Enabled: false

  EmptyBlockDomain:
    Type: AWS::Elasticsearch::Domain
    Properties:
      DomainName: empty-block-domain
      ElasticsearchVersion: "7.10"
      NodeToNodeEncryptionOptions:
        Enabled: true

  PropertiesFirstDomain:
    Properties:
      DomainName: properties-first-domain
      ElasticsearchVersion: "7.10"
      NodeToNodeEncryptionOptions:
        Enabled: true
    Type: AWS::Elasticsearch::Domain

  ExplicitTrueYesDQDomain:
    Type: AWS::Elasticsearch::Domain
    Properties:
      DomainName: explicit-true-yes-dq-domain
      ElasticsearchVersion: "7.10"
      NodeToNodeEncryptionOptions:
        Enabled: "yes"

  ExplicitTrueYesSQDomain:
    Type: AWS::Elasticsearch::Domain
    Properties:
      DomainName: explicit-true-yes-sq-domain
      ElasticsearchVersion: "7.10"
      NodeToNodeEncryptionOptions:
        Enabled: 'yes'

  LongFormRefDomain:
    Type: AWS::Elasticsearch::Domain
    Properties:
      DomainName: long-form-ref-domain
      ElasticsearchVersion: "7.10"
      NodeToNodeEncryptionOptions:
        Enabled:
          Ref: EnableNodeEncryption

  ExplicitTrueDQTrueDomain:
    Type: AWS::Elasticsearch::Domain
    Properties:
      DomainName: explicit-true-dq-true-domain
      ElasticsearchVersion: "7.10"
      NodeToNodeEncryptionOptions:
        Enabled: "True"

  ExplicitTrueDQYESDomain:
    Type: AWS::Elasticsearch::Domain
    Properties:
      DomainName: explicit-true-dq-yes-domain
      ElasticsearchVersion: "7.10"
      NodeToNodeEncryptionOptions:
        Enabled: "YES"

  ExplicitTrueDQONDomain:
    Type: AWS::Elasticsearch::Domain
    Properties:
      DomainName: explicit-true-dq-on-domain
      ElasticsearchVersion: "7.10"
      NodeToNodeEncryptionOptions:
        Enabled: "ON"

  ExplicitTrueSQTrueDomain:
    Type: AWS::Elasticsearch::Domain
    Properties:
      DomainName: explicit-true-sq-true-domain
      ElasticsearchVersion: "7.10"
      NodeToNodeEncryptionOptions:
        Enabled: 'True'

  ExplicitTrueSQYESDomain:
    Type: AWS::Elasticsearch::Domain
    Properties:
      DomainName: explicit-true-sq-yes-domain
      ElasticsearchVersion: "7.10"
      NodeToNodeEncryptionOptions:
        Enabled: 'YES'

  ExplicitTrueSQONDomain:
    Type: AWS::Elasticsearch::Domain
    Properties:
      DomainName: explicit-true-sq-on-domain
      ElasticsearchVersion: "7.10"
      NodeToNodeEncryptionOptions:
        Enabled: 'ON'

  NullBlockDomain:
    Type: AWS::Elasticsearch::Domain
    Properties:
      DomainName: null-block-domain
      ElasticsearchVersion: "7.10"
      NodeToNodeEncryptionOptions:
        Enabled: true
