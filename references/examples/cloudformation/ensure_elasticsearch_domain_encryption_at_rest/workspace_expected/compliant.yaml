Parameters:
  EnableEncryptionParam:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"

Conditions:
  IsEncrypted: !Equals [!Ref EnableEncryptionParam, "true"]

Resources:
  ExplicitTruePlain:
    Type: AWS::Elasticsearch::Domain
    Properties:
      DomainName: explicit-true-plain
      EncryptionAtRestOptions:
        Enabled: true

  ExplicitTrueDoubleQuoted:
    Type: AWS::Elasticsearch::Domain
    Properties:
      DomainName: explicit-true-double-quoted
      EncryptionAtRestOptions:
        Enabled: "true"

  ExplicitTrueSingleQuoted:
    Type: AWS::Elasticsearch::Domain
    Properties:
      DomainName: explicit-true-single-quoted
      EncryptionAtRestOptions:
        Enabled: 'true'

  ExplicitTrueYes:
    Type: AWS::Elasticsearch::Domain
    Properties:
      DomainName: explicit-true-yes
      EncryptionAtRestOptions:
        Enabled: yes

  RefParamEnabled:
    Type: AWS::Elasticsearch::Domain
    Properties:
      DomainName: ref-param-enabled
      EncryptionAtRestOptions:
        Enabled: !Ref EnableEncryptionParam

  IfConditionEnabled:
    Type: AWS::Elasticsearch::Domain
    Properties:
      DomainName: if-condition-enabled
      EncryptionAtRestOptions:
        Enabled: !If [IsEncrypted, true, false]

  OpenSearchDomainFalse:
    Type: AWS::OpenSearchService::Domain
    Properties:
      DomainName: opensearch-domain-false
      EncryptionAtRestOptions:
        Enabled: false

  RefParamEnabledLongForm:
    Type: AWS::Elasticsearch::Domain
    Properties:
      DomainName: ref-param-enabled-long-form
      EncryptionAtRestOptions:
        Enabled:
          Ref: EnableEncryptionParam
