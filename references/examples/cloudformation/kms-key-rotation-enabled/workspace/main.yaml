Resources:
  MissingRotationDefaultKeySpec:
    Type: AWS::KMS::Key
    Properties:
      Description: A symmetric KMS key with no rotation set

  RotationFalseUnquoted:
    Type: AWS::KMS::Key
    Properties:
      Description: A symmetric KMS key with rotation false
      EnableKeyRotation: false

  RotationFalseDoubleQuoted:
    Type: AWS::KMS::Key
    Properties:
      Description: A symmetric KMS key with rotation double-quoted false
      EnableKeyRotation: "false"

  RotationFalseSingleQuoted:
    Type: AWS::KMS::Key
    Properties:
      Description: A symmetric KMS key with rotation single-quoted false
      EnableKeyRotation: 'false'

  RotationFalseCapital:
    Type: AWS::KMS::Key
    Properties:
      Description: A symmetric KMS key with rotation False capital
      EnableKeyRotation: False

  RotationNoAlias:
    Type: AWS::KMS::Key
    Properties:
      Description: A symmetric KMS key with rotation no alias
      EnableKeyRotation: no

  RotationOffAlias:
    Type: AWS::KMS::Key
    Properties:
      Description: A symmetric KMS key with rotation off alias
      EnableKeyRotation: off

  RotationFalseExplicitSymmetric:
    Type: AWS::KMS::Key
    Properties:
      Description: A symmetric KMS key with explicit KeySpec and rotation false
      KeySpec: SYMMETRIC_DEFAULT
      EnableKeyRotation: false

  MissingRotationExplicitSymmetric:
    Type: AWS::KMS::Key
    Properties:
      Description: A symmetric KMS key with explicit KeySpec and rotation absent
      KeySpec: SYMMETRIC_DEFAULT

  RotationTrueUnquoted:
    Type: AWS::KMS::Key
    Properties:
      Description: A symmetric KMS key with rotation enabled
      EnableKeyRotation: true

  RotationTrueDoubleQuoted:
    Type: AWS::KMS::Key
    Properties:
      Description: A symmetric KMS key with rotation enabled double-quoted
      EnableKeyRotation: "true"

  RotationTrueSingleQuoted:
    Type: AWS::KMS::Key
    Properties:
      Description: A symmetric KMS key with rotation enabled single-quoted
      EnableKeyRotation: 'true'

  RotationTrueCapital:
    Type: AWS::KMS::Key
    Properties:
      Description: A symmetric KMS key with rotation True capital
      EnableKeyRotation: True

  RotationRefParam:
    Type: AWS::KMS::Key
    Properties:
      Description: A symmetric KMS key with rotation via Ref
      EnableKeyRotation: !Ref EnableRotationParam

  RotationLongFormRef:
    Type: AWS::KMS::Key
    Properties:
      Description: A symmetric KMS key with rotation via long-form Ref
      EnableKeyRotation:
        Ref: EnableRotationParam

  RotationIfCondition:
    Type: AWS::KMS::Key
    Properties:
      Description: A symmetric KMS key with rotation via If
      EnableKeyRotation: !If [IsProd, true, !Ref 'AWS::NoValue']

  AsymmetricRsaKeyFalse:
    Type: AWS::KMS::Key
    Properties:
      Description: An asymmetric RSA key
      KeySpec: RSA_2048
      EnableKeyRotation: false

  AsymmetricEccKeyMissing:
    Type: AWS::KMS::Key
    Properties:
      Description: An asymmetric ECC key
      KeySpec: ECC_NIST_P256

  HmacKeyFalse:
    Type: AWS::KMS::Key
    Properties:
      Description: An HMAC key
      KeySpec: HMAC_256
      EnableKeyRotation: false

  HmacKeyMissing:
    Type: AWS::KMS::Key
    Properties:
      Description: An HMAC key missing rotation
      KeySpec: HMAC_512

  WrongResourceType:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /my/param
      Value: "false"
      Type: String

  DescriptionMentionsRsa:
    Type: AWS::KMS::Key
    Properties:
      Description: "Migrating from legacy RSA_2048 asymmetric signing key"
      EnableKeyRotation: false

  DescriptionMentionsHmac:
    Type: AWS::KMS::Key
    Properties:
      Description: "Replacement for HMAC_256 authentication key"

  KeySpecDoubleQuotedSymmetric:
    Type: AWS::KMS::Key
    Properties:
      Description: A symmetric KMS key with double-quoted SYMMETRIC_DEFAULT KeySpec
      KeySpec: "SYMMETRIC_DEFAULT"
      EnableKeyRotation: false

  KeySpecSingleQuotedSymmetric:
    Type: AWS::KMS::Key
    Properties:
      Description: A symmetric KMS key with single-quoted SYMMETRIC_DEFAULT KeySpec
      KeySpec: 'SYMMETRIC_DEFAULT'
      EnableKeyRotation: false

  DescriptionContainsKeySpec:
    Type: AWS::KMS::Key
    Properties:
      Description: "Note: KeySpec: defaults to SYMMETRIC_DEFAULT"
      EnableKeyRotation: false
