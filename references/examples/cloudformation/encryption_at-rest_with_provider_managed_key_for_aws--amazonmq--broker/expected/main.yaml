Resources:
  MyAmazonMQBroker:
    Type: AWS::AmazonMQ::Broker
    Properties:
      BrokerName: my-broker
      BrokerInstanceType: mq.t3.micro
      DeploymentMode: SINGLE_INSTANCE
      EngineType: ActiveMQ
      EngineVersion: 5.15.0
      PubliclyAccessible: false
      Users:
        - Username: admin
          Password: !Ref AdminPassword
          Groups:
            - admin
      EncryptionOptions:
        UseAwsOwnedKey: true

  AnotherBroker:
    Type: AWS::AmazonMQ::Broker
    Properties:
      BrokerName: another-broker
      BrokerInstanceType: mq.t3.micro
      DeploymentMode: SINGLE_INSTANCE
      EngineType: ActiveMQ
      EngineVersion: 5.15.0
      PubliclyAccessible: false
      EncryptionOptions:
        UseAwsOwnedKey: true
      Users:
        - Username: admin
          Password: !Ref AdminPassword
          Groups:
            - admin

  ThirdBroker:
    Type: AWS::AmazonMQ::Broker
    Properties:
      BrokerName: third-broker
      BrokerInstanceType: mq.t3.micro
      DeploymentMode: SINGLE_INSTANCE
      EngineType: ActiveMQ
      EngineVersion: 5.15.0
      PubliclyAccessible: false
      EncryptionOptions:
        UseAwsOwnedKey: true
      Users:
        - Username: admin
          Password: !Ref AdminPassword
          Groups:
            - admin
